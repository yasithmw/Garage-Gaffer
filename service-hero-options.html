<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Garage Gaffer — Service Page Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --color-brand-primary:#0D7A5F;
  --color-brand-deep:#055240;
  --color-brand-forest:#2B4C32;
  --color-brand-dark:#0A2B14;
  --color-brand-mint:#ECF7EF;
  --color-brand-pale-mint:#E3FFEF;
  --color-accent-teal:#31A7A8;
  --color-warning:#F9C339;

  --color-text-primary:#1A1E1D;
  --color-text-secondary:#595C5B;
  --color-text-disabled:#8A8D8C;
  --color-divider:#DADCDB;

  --color-bg:#F5F7F6;
  --color-surface:#FFFFFF;

  --radius-sm:4px;
  --radius-md:8px;
  --radius-lg:12px;
  --radius-xl:16px;
  --radius-2xl:24px;
  --radius-full:9999px;

  --shadow-sm:0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(13,122,95,.08), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 8px 24px rgba(13,122,95,.12), 0 4px 8px rgba(0,0,0,.06);
  --shadow-xl:0 16px 48px rgba(13,122,95,.15), 0 8px 16px rgba(0,0,0,.08);

  --t-fast:120ms ease;
  --t-base:200ms ease;
  --t-slow:350ms cubic-bezier(0.4, 0, 0.2, 1);

  --container:1200px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Rubik',sans-serif;
  font-size:15px; line-height:1.6;
  color:var(--color-text-primary);
  background:#F8FAF9;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,h5{font-family:'Open Sans',sans-serif; color:var(--color-text-primary); margin:0; font-weight:800}
img,svg{display:block; max-width:100%}
button{font-family:inherit; cursor:pointer; border:0; background:transparent}
input,select{font-family:inherit}
a{color:inherit; text-decoration:none}

.container{max-width:var(--container); margin:0 auto; padding:0 32px}

/* ================ HERO ================ */
.hero{
  position:relative;
  background:
    radial-gradient(1200px 500px at 80% -10%, rgba(13,122,95,.07), transparent 60%),
    radial-gradient(800px 400px at 10% 100%, rgba(49,167,168,.06), transparent 60%),
    #F8FAF9;
  overflow:hidden;
  padding:64px 0 96px;
}
.hero::before{
  content:""; position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(13,122,95,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(13,122,95,.035) 1px, transparent 1px);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse at center, black 20%, transparent 75%);
  pointer-events:none;
}

.hero-head{
  position:relative; text-align:center;
  max-width:760px; margin:0 auto 40px;
}
.hero-breadcrumb{
  display:inline-flex; align-items:center; gap:8px;
  font-family:'Rubik',sans-serif; font-size:11px; font-weight:600;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--color-text-secondary);
  margin-bottom:22px;
}
.hero-breadcrumb .dot{width:3px; height:3px; border-radius:50%; background:var(--color-text-secondary)}
.hero-breadcrumb .here{color:var(--color-brand-primary)}
.hero-head h1{
  font-family:'Open Sans',sans-serif; font-size:60px; line-height:1.02;
  letter-spacing:-1.8px; font-weight:800; margin-bottom:16px;
  color:var(--color-text-primary);
}
.hero-head h1 em{
  font-style:normal; color:var(--color-brand-primary);
  font-family:'Open Sans',sans-serif; font-weight:800;
  background:linear-gradient(180deg, transparent 62%, rgba(13,122,95,.15) 62%);
  padding:0 2px;
}
.hero-head p{
  font-family:'Rubik',sans-serif; font-size:16px; line-height:1.55;
  color:var(--color-text-secondary); max-width:560px; margin:0 auto;
}

/* ============== COMPACT WIDGET ============== */
.widget{
  position:relative;
  max-width:720px; margin:0 auto;
  background:#fff;
  border-radius:var(--radius-xl);
  padding:6px 6px 6px 6px;
  display:grid;
  grid-template-columns: 1fr 1.2fr 1.1fr auto;
  align-items:center; gap:0;
  box-shadow:0 2px 6px rgba(0,0,0,.04), 0 16px 40px rgba(10,43,20,.1);
  border:1px solid rgba(13,122,95,.1);
}
.widget-field{
  position:relative; padding:8px 14px;
  display:flex; flex-direction:column; justify-content:center; gap:2px;
  min-width:0; cursor:text;
  border-radius:var(--radius-md);
  transition:background var(--t-fast);
}
.widget-field:hover{background:#F8FAF9}
.widget-field + .widget-field::before{
  content:""; position:absolute; left:0; top:10px; bottom:10px; width:1px;
  background:var(--color-divider);
}
.widget-field-label{
  font-family:'Rubik',sans-serif; font-size:10.5px; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--color-text-secondary);
}
.widget-field input,
.widget-field select{
  background:transparent; border:0; outline:none; padding:0;
  font-family:'Rubik',sans-serif; font-size:13.5px; font-weight:500;
  color:var(--color-text-primary);
  width:100%; min-width:0;
  appearance:none; height:20px;
}
.widget-field input::placeholder{color:var(--color-text-disabled)}

/* Car reg: compact UK plate, sized to match row height */
.widget-plate{
  display:inline-flex; align-items:center;
  background:#FFD60A; border:1px solid #1A1A1A;
  border-radius:var(--radius-sm);
  overflow:hidden; white-space:nowrap;
  height:26px; margin-top:1px;
}
.widget-plate-gb{
  background:#003399; color:#FFD60A;
  width:22px; height:100%; display:inline-flex; align-items:center; justify-content:center;
  font-family:'Open Sans',sans-serif; font-weight:700; font-size:9px;
  letter-spacing:0.02em;
}
.widget-plate-input{
  background:transparent; border:0; outline:none;
  font-family:'Open Sans',sans-serif; font-weight:800;
  color:#1A1A1A; font-size:13.5px; letter-spacing:0.03em;
  padding:0 10px 0 8px; width:100%; min-width:0; height:100%;
}
.widget-plate-input::placeholder{color:rgba(26,26,26,.4)}

/* Service select — chevron */
.widget-field-select{position:relative}
.widget-field-select::after{
  content:""; position:absolute; right:14px; top:50%;
  width:7px; height:7px;
  border-right:1.5px solid var(--color-text-secondary);
  border-bottom:1.5px solid var(--color-text-secondary);
  transform:translateY(-80%) rotate(45deg);
  pointer-events:none;
}
.widget-field-select select{padding-right:20px; cursor:pointer}

/* CTA — standard button scale (btn-sm), centered in its cell */
.widget-cta{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  background:var(--color-brand-primary); color:#fff;
  height:32px; padding:0 14px;
  margin:0 6px 0 4px;
  border-radius:var(--radius-md);
  font-family:'Rubik',sans-serif; font-weight:600; font-size:12.5px;
  transition:background var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
  box-shadow:0 2px 6px rgba(13,122,95,.2);
  white-space:nowrap;
}
.widget-cta:hover{background:var(--color-brand-deep); transform:translateY(-1px); box-shadow:0 4px 12px rgba(13,122,95,.28)}
.widget-cta:active{transform:translateY(0)}
.widget-cta svg{width:12px; height:12px}

/* Meta row */
.hero-meta{
  display:flex; align-items:center; justify-content:center;
  gap:16px; margin-top:22px; flex-wrap:wrap;
  font-family:'Rubik',sans-serif; font-size:12.5px; color:var(--color-text-secondary);
}
.hero-meta .dot{width:3px; height:3px; border-radius:50%; background:var(--color-text-disabled)}
.hero-meta strong{color:var(--color-text-primary); font-weight:600}
.hero-meta .live-dot{
  width:7px; height:7px; border-radius:50%;
  background:var(--color-brand-primary);
  box-shadow:0 0 0 0 rgba(13,122,95,.5);
  animation:pulse 2s infinite;
  display:inline-block; margin-right:4px;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(13,122,95,.55)}
  70%{box-shadow:0 0 0 6px rgba(13,122,95,0)}
  100%{box-shadow:0 0 0 0 rgba(13,122,95,0)}
}

/* Responsive */
@media (max-width:820px){
  .hero{padding:48px 0 72px}
  .hero-head h1{font-size:40px; letter-spacing:-1.2px}
  .widget{
    grid-template-columns:1fr;
    padding:8px;
    border-radius:var(--radius-xl);
  }
  .widget-field{padding:10px 14px; border-top:1px solid var(--color-divider)}
  .widget-field:first-child{border-top:0}
  .widget-field + .widget-field::before{display:none}
  .widget-cta{height:40px; padding:0 18px; margin:4px 0 0; font-size:14px; width:100%}
  .widget-cta svg{width:14px; height:14px}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.01ms !important;
  }
}
</style>
</head>
<body>

<section class="hero">
  <div class="container">
    <div class="hero-head">
      <div class="hero-breadcrumb">
        <span>Services</span><span class="dot"></span>
        <span class="here">Car repairs · Bristol</span>
      </div>
      <h1>Something's wrong with your car. <em>Let's sort it.</em></h1>
      <p>Describe the noise, the warning light, or the feeling that's off. Vetted Bristol mechanics quote you direct — and come to you.</p>
    </div>

    <form class="widget" onsubmit="event.preventDefault()">
      <label class="widget-field">
        <span class="widget-field-label">Postcode</span>
        <input type="text" placeholder="BS8 1TH" autocomplete="postal-code" />
      </label>

      <label class="widget-field">
        <span class="widget-field-label">Car reg</span>
        <span class="widget-plate">
          <span class="widget-plate-gb">GB</span>
          <input class="widget-plate-input" type="text" placeholder="AB12 CDE" />
        </span>
      </label>

      <label class="widget-field widget-field-select">
        <span class="widget-field-label">What do you need?</span>
        <select>
          <option>Repair a specific issue</option>
          <option>Full service</option>
          <option>MOT + repair</option>
          <option>Diagnostic check</option>
          <option>Brakes / tyres</option>
        </select>
      </label>

      <button class="widget-cta" type="submit">
        See my price
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </form>

    <div class="hero-meta">
      <span><span class="live-dot"></span><strong>127</strong> mechanics live in Bristol</span>
      <span class="dot"></span>
      <span>Average quote in <strong>7 mins</strong></span>
      <span class="dot"></span>
      <span>Free to post — no card needed</span>
    </div>
  </div>
</section>

</body>
</html>
